name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration" --cov=src --cov=data_generator --cov-report=term-missing --cov-fail-under=80

      - name: Lint
        run: |
          pip install ruff
          ruff check src/ data_generator/ tests/ --ignore E501

  dbt-compile:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shopstream
          POSTGRES_USER: shopstream
          POSTGRES_PASSWORD: shopstream123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-postgres

      - name: dbt compile
        working-directory: dbt
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: shopstream
          POSTGRES_USER: shopstream
          POSTGRES_PASSWORD: shopstream123
        run: dbt compile
